<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0f17">
<title>Personal AI OS — Task Board</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%236366f1'/><text x='16' y='22' font-size='15' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>AI</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
<style>
  :root{
    --bg:#0b0f17;--panel:#121826;--panel2:#0e1420;--line:#1f2937;--line2:#2a3650;
    --ink:#e6edf5;--dim:#93a1b5;--mute:#5b6b82;--accent:#6366f1;--accent2:#8b5cf6;
    --todo:#3b82f6;--prog:#f59e0b;--review:#a855f7;--done:#22c55e;--drop:#64748b;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);
    background:radial-gradient(1100px 500px at 12% -8%,rgba(99,102,241,.12),transparent 60%),
      radial-gradient(900px 480px at 100% 0%,rgba(139,92,246,.10),transparent 55%),var(--bg);min-height:100vh}
  button{font-family:inherit}
  header{position:sticky;top:0;z-index:40;background:rgba(11,15,23,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:11px clamp(12px,3vw,26px)}
  .hrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;white-space:nowrap}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff}
  .brand small{display:block;font-weight:500;font-size:10px;color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
  .grow{flex:1}
  .search{position:relative;flex:1;min-width:150px;max-width:380px}
  .search input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);
    padding:9px 12px 9px 33px;font-size:13.5px;outline:none}
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 13px;
    font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:0;color:#fff}
  select.ctl,input.ctl{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:9px 11px;font-size:13px;outline:none;cursor:pointer}
  .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:11px clamp(12px,3vw,26px) 0}
  .tools .lbl{font-size:11px;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
  .chip{background:var(--panel);border:1px solid var(--line);color:var(--dim);border-radius:99px;padding:6px 12px;
    font-size:12px;font-weight:600;cursor:pointer;user-select:none}
  .chip.on{background:rgba(99,102,241,.16);border-color:var(--accent);color:#c7ccff}
  .meta{padding:9px clamp(12px,3vw,26px) 0;font-size:12px;color:var(--mute)}
  .board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:13px;padding:13px clamp(12px,3vw,26px) 44px;align-items:start}
  @media(max-width:1180px){.board{grid-template-columns:repeat(3,minmax(0,1fr))}}
  @media(max-width:760px){.board{grid-template-columns:1fr}}
  .col{background:var(--panel2);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;
    min-height:120px;max-height:calc(100vh - 230px)}
  .col.drop{border-color:var(--accent);background:rgba(99,102,241,.06)}
  .col-h{display:flex;align-items:center;gap:9px;padding:12px 13px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--panel2);border-radius:var(--radius) var(--radius) 0 0;z-index:1}
  .dot{width:9px;height:9px;border-radius:50%}
  .col-h h3{font-size:13px;font-weight:700}
  .cnt{margin-left:auto;font-size:11px;font-weight:700;color:var(--dim);background:var(--panel);border:1px solid var(--line);
    border-radius:99px;padding:2px 9px;min-width:26px;text-align:center}
  .add-col{margin-left:6px;width:24px;height:24px;border-radius:7px;border:1px solid var(--line);background:var(--panel);
    color:var(--dim);font-size:16px;line-height:1;cursor:pointer}
  .add-col:hover{border-color:var(--accent);color:var(--ink)}
  .col-body{padding:10px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:60px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;cursor:grab;
    transition:border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--line2);box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .card.dragging{opacity:.5}
  .card h4{font-size:13.5px;font-weight:650;line-height:1.4;word-break:break-word;overflow-wrap:anywhere;margin-bottom:6px}
  .card .desc{font-size:12px;color:var(--dim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;align-items:center}
  .b{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
  .b-src{background:rgba(139,92,246,.14);color:#c4b5fd;border:1px solid rgba(139,92,246,.3)}
  .b-pillar{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.28)}
  .u-Low{background:rgba(71,85,105,.28);color:#cbd5e1}
  .u-Medium{background:rgba(59,130,246,.16);color:#93c5fd}
  .u-High{background:rgba(245,158,11,.16);color:#fcd34d}
  .u-Critical{background:rgba(239,68,68,.18);color:#fca5a5}
  .ava{margin-left:auto;width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:10px;
    font-weight:800;color:#0b0f17;flex-shrink:0}
  .due{font-size:11px;color:var(--mute);margin-top:8px;display:flex;align-items:center;gap:6px}
  .due.soon{color:#fca5a5}
  .empty{padding:22px 12px;text-align:center;color:var(--mute);font-size:12px}
  .modal{position:fixed;inset:0;z-index:80;background:rgba(3,6,12,.72);backdrop-filter:blur(6px);display:none;
    align-items:center;justify-content:center;padding:16px}
  .modal.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:580px;width:100%;
    max-height:90vh;overflow-y:auto;padding:20px 20px 24px}
  .sheet .x{float:right;font-size:22px;line-height:1;color:var(--dim);cursor:pointer;background:none;border:0}
  .sheet h3{font-size:16px;margin:2px 36px 14px 0}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--mute);font-weight:700;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);padding:9px 11px;font-size:13.5px;outline:none;font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{min-height:74px;resize:vertical;line-height:1.55}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .modal-actions{display:flex;gap:9px;margin-top:18px;align-items:center}
  .modal-actions .del{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:9px;
    padding:9px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .src-link{font-size:12px;color:#93c5fd;text-decoration:none}
  .foot{padding:16px clamp(12px,3vw,26px) 40px;color:var(--mute);font-size:11.5px;text-align:center;line-height:1.7}
  .nodata{margin:18px clamp(12px,3vw,26px);border:1.5px dashed var(--line);border-radius:var(--radius);padding:34px 20px;text-align:center;background:var(--panel2)}
  .nodata h2{font-size:18px;margin-bottom:8px}.nodata p{color:var(--dim);font-size:13px;line-height:1.7;max-width:540px;margin:0 auto 14px}
  .nodata code{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:#c7ccff;font-size:12px}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);
    color:var(--ink);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:120;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand"><span class="logo">AI</span><span>Personal AI OS<small>Task Board</small></span></div>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="Search tasks, people…" autocomplete="off">
    </div>
    <span class="grow"></span>
    <select class="ctl" id="sortSel" title="Sort within columns">
      <option value="urgency">Sort: Priority</option>
      <option value="deadline">Sort: Deadline</option>
      <option value="created">Sort: Created</option>
      <option value="title">Sort: Title A–Z</option>
    </select>
    <button class="btn" id="loadBtn">⬆ Import</button>
    <input id="file" type="file" accept=".xlsx,.csv,.json" hidden>
    <button class="btn" id="exportBtn">⬇ Export</button>
    <button class="btn primary" id="addBtn">＋ Add task</button>
  </div>
  <div class="tools">
    <span class="lbl">Source</span><span id="srcFilters"></span>
    <span class="lbl" style="margin-left:8px">Assignee</span><span id="asgFilters"></span>
  </div>
</header>

<div class="meta" id="meta"></div>
<div id="boardWrap"></div>
<div class="foot" id="foot"></div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
const LS_KEY = "paios_board_v1";
const COLUMNS = [
  {key:"open",       title:"To Do",       color:"var(--todo)"},
  {key:"in_progress",title:"In Progress", color:"var(--prog)"},
  {key:"review",     title:"In Review",   color:"var(--review)"},
  {key:"done",       title:"Done",        color:"var(--done)"},
  {key:"dropped",    title:"Dropped",     color:"var(--drop)"},
];
const URANK = {Critical:0,High:1,Medium:2,Low:3};
const AVA_COLORS = ["#6366f1","#22c55e","#f59e0b","#ef4444","#a855f7","#06b6d4","#ec4899","#84cc16"];
let TASKS = [];
let activeSrc="All", activeAsg="All", query="", sortBy="urgency";

const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=>"t"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1800);}

function normStatus(s){s=String(s||"open").toLowerCase().replace(/\s+/g,"_");
  if(["done","closed","complete","completed"].includes(s))return"done";
  if(["dropped","cancelled","canceled","wontfix"].includes(s))return"dropped";
  if(["review","in_review","qa"].includes(s))return"review";
  if(["in_progress","doing","wip","started"].includes(s))return"in_progress";
  return"open";}
function normUrg(u){u=String(u||"Medium").trim();u=u.charAt(0).toUpperCase()+u.slice(1).toLowerCase();return URANK.hasOwnProperty(u)?u:"Medium";}
function initials(n){n=String(n||"").trim();if(!n)return"–";const p=n.split(/\s+/);return((p[0][0]||"")+(p[1]?p[1][0]:"")).toUpperCase();}
function avaColor(n){let h=0;for(const c of String(n||"")){h=(h*31+c.charCodeAt(0))>>>0;}return AVA_COLORS[h%AVA_COLORS.length];}

function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(TASKS));}catch{}}
function dueSoon(d){if(!d)return false;const t=Date.parse(d);return!isNaN(t)&&t-Date.now()<3*864e5;}

async function boot(){
  let local=null;
  try{local=JSON.parse(localStorage.getItem(LS_KEY)||"null");}catch{}
  if(Array.isArray(local)&&local.length){ TASKS=local.map(clean); render(); return; }
  try{
    const r=await fetch("data.json?_="+Date.now()); const j=await r.json();
    TASKS=(j.tasks||[]).map(clean); window.__SRC__=j.generated_from; save();
  }catch{ TASKS=[]; }
  render();
}
function clean(t){
  return {id:t.id||uid(),source_type:t.source_type||"",source_link:t.source_link||"",
    task:t.task||"",task_description:t.task_description||"",rationale:t.rationale||"",
    growth_pillar:t.growth_pillar||"",deadline:t.deadline||"",urgency:normUrg(t.urgency),
    assignee:t.assignee||t.spoc||"",summary:t.summary||"",status:normStatus(t.status),created_at:t.created_at||new Date().toISOString()};
}
const sources=()=>["All",...Array.from(new Set(TASKS.map(t=>t.source_type).filter(Boolean)))];
const assignees=()=>["All",...Array.from(new Set(TASKS.map(t=>t.assignee).filter(Boolean)))];
function matches(t){
  if(activeSrc!=="All"&&t.source_type!==activeSrc)return false;
  if(activeAsg!=="All"&&t.assignee!==activeAsg)return false;
  if(query){const h=[t.task,t.task_description,t.summary,t.assignee,t.growth_pillar].join(" ").toLowerCase();if(!h.includes(query))return false;}
  return true;
}
function sortTasks(a,b){
  if(sortBy==="urgency")return URANK[a.urgency]-URANK[b.urgency];
  if(sortBy==="deadline"){const x=Date.parse(a.deadline)||8e15,y=Date.parse(b.deadline)||8e15;return x-y;}
  if(sortBy==="created"){return (Date.parse(b.created_at)||0)-(Date.parse(a.created_at)||0);}
  if(sortBy==="title")return String(a.task).localeCompare(String(b.task));
  return 0;
}

function render(){
  $("#srcFilters").innerHTML=sources().map(s=>`<span class="chip ${s===activeSrc?'on':''}" data-f="src" data-v="${esc(s)}">${esc(s)}</span>`).join("");
  $("#asgFilters").innerHTML=assignees().map(s=>`<span class="chip ${s===activeAsg?'on':''}" data-f="asg" data-v="${esc(s)}">${esc(s==="All"?"All":(s||"Unassigned"))}</span>`).join("");

  if(!TASKS.length){
    $("#meta").textContent="";
    $("#boardWrap").innerHTML=`<div class="nodata"><h2>No tasks yet</h2>
      <p>Add a task with <b>＋ Add task</b>, or <b>Import</b> an .xlsx/.csv/.json export
      (parsed in your browser — nothing is uploaded). The local AI&nbsp;OS service also
      writes <code>data.json</code> automatically via <code>python web/build_board.py</code>.</p>
      <button class="btn primary" id="addEmpty">＋ Add your first task</button></div>`;
    $("#addEmpty").onclick=()=>openEditor(null);
    $("#foot").textContent="";return;
  }
  const vis=TASKS.filter(matches);
  $("#meta").innerHTML=`<b style="color:var(--dim)">${vis.length}</b> of ${TASKS.length} tasks`
    +(activeSrc!=="All"?` · source: <b style="color:var(--dim)">${esc(activeSrc)}</b>`:"")
    +(activeAsg!=="All"?` · assignee: <b style="color:var(--dim)">${esc(activeAsg)}</b>`:"")
    +(query?` · “${esc(query)}”`:"");

  const byCol=Object.fromEntries(COLUMNS.map(c=>[c.key,[]]));
  vis.forEach(t=>{(byCol[t.status]||byCol.open).push(t);});
  for(const k in byCol)byCol[k].sort(sortTasks);

  $("#boardWrap").innerHTML=`<div class="board">`+COLUMNS.map(c=>`
    <section class="col" data-col="${c.key}">
      <div class="col-h"><span class="dot" style="background:${c.color}"></span><h3>${c.title}</h3>
        <span class="cnt">${byCol[c.key].length}</span>
        <button class="add-col" data-add="${c.key}" title="Add to ${c.title}">＋</button></div>
      <div class="col-body" data-body="${c.key}">
        ${byCol[c.key].length?byCol[c.key].map(card).join(""):`<div class="empty">Drop here</div>`}
      </div></section>`).join("")+`</div>`;

  wireDnD();
  document.querySelectorAll(".card").forEach(el=>el.addEventListener("click",()=>{if(!el._drag)openEditor(el.dataset.id);}));
  document.querySelectorAll("[data-add]").forEach(b=>b.onclick=e=>{e.stopPropagation();openEditor(null,b.dataset.add);});
  $("#foot").textContent=`${TASKS.length} tasks · drag cards between columns · edits saved in your browser`+(window.__SRC__?` · seeded from ${window.__SRC__}`:"");
}
function card(t){
  const due=t.deadline?`<div class="due ${dueSoon(t.deadline)?'soon':''}">🗓 ${esc(t.deadline)}</div>`:"";
  return `<article class="card" draggable="true" data-id="${esc(t.id)}">
    <h4>${esc(t.task||"(untitled)")}</h4>
    ${t.task_description?`<div class="desc">${esc(t.task_description)}</div>`:""}
    <div class="badges">
      <span class="b u-${t.urgency}">${esc(t.urgency)}</span>
      ${t.source_type?`<span class="b b-src">${esc(t.source_type)}</span>`:""}
      ${t.growth_pillar?`<span class="b b-pillar">${esc(t.growth_pillar)}</span>`:""}
      ${t.assignee?`<span class="ava" style="background:${avaColor(t.assignee)}" title="${esc(t.assignee)}">${esc(initials(t.assignee))}</span>`:""}
    </div>${due}</article>`;
}

let dragId=null;
function wireDnD(){
  document.querySelectorAll(".card").forEach(c=>{
    c.addEventListener("dragstart",e=>{dragId=c.dataset.id;c._drag=true;c.classList.add("dragging");e.dataTransfer.effectAllowed="move";});
    c.addEventListener("dragend",()=>{c.classList.remove("dragging");setTimeout(()=>c._drag=false,50);});
  });
  document.querySelectorAll(".col").forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("drop");});
    col.addEventListener("dragleave",()=>col.classList.remove("drop"));
    col.addEventListener("drop",e=>{e.preventDefault();col.classList.remove("drop");
      const t=TASKS.find(x=>x.id===dragId);if(t&&t.status!==col.dataset.col){t.status=col.dataset.col;save();render();toast("Moved to "+COLUMNS.find(c=>c.key===col.dataset.col).title);}});
  });
}

function openEditor(id,presetStatus){
  const t=id?TASKS.find(x=>x.id===id):null;
  const v=t||{status:presetStatus||"open",urgency:"Medium"};
  const opt=(arr,sel)=>arr.map(o=>`<option value="${esc(o)}" ${o===sel?'selected':''}>${esc(o)}</option>`).join("");
  $("#sheet").innerHTML=`<button class="x" onclick="closeModal()">×</button>
    <h3>${t?"Edit task":"New task"}</h3>
    <div class="field"><label>Title</label><input id="f-task" value="${esc(v.task||"")}" placeholder="What needs doing?"></div>
    <div class="field"><label>Description</label><textarea id="f-desc" placeholder="Details…">${esc(v.task_description||"")}</textarea></div>
    <div class="grid2">
      <div class="field"><label>Status</label><select id="f-status">${opt(COLUMNS.map(c=>c.key),v.status)}</select></div>
      <div class="field"><label>Priority</label><select id="f-urg">${opt(["Critical","High","Medium","Low"],v.urgency)}</select></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Assignee</label><input id="f-asg" value="${esc(v.assignee||"")}" placeholder="Name" list="asgList"><datalist id="asgList">${assignees().filter(a=>a!=="All").map(a=>`<option value="${esc(a)}">`).join("")}</datalist></div>
      <div class="field"><label>Deadline</label><input id="f-due" value="${esc(v.deadline||"")}" placeholder="YYYY-MM-DD or text"></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Source</label><input id="f-src" value="${esc(v.source_type||"")}" placeholder="Email / Meeting / Manual" list="srcList"><datalist id="srcList">${sources().filter(a=>a!=="All").map(a=>`<option value="${esc(a)}">`).join("")}</datalist></div>
      <div class="field"><label>Growth pillar</label><input id="f-pillar" value="${esc(v.growth_pillar||"")}" placeholder="e.g. Retention"></div>
    </div>
    <div class="field"><label>Notes / summary</label><textarea id="f-sum" placeholder="Context…">${esc(v.summary||"")}</textarea></div>
    ${v.source_link?`<a class="src-link" href="${esc(v.source_link)}" target="_blank" rel="noopener">↗ Open source</a>`:""}
    <div class="modal-actions">
      ${t?`<button class="del" id="f-del">Delete</button>`:""}
      <span style="flex:1"></span>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" id="f-save">${t?"Save":"Create"}</button>
    </div>`;
  $("#modal").classList.add("open");
  setTimeout(()=>$("#f-task").focus(),30);
  $("#f-save").onclick=()=>{
    const data={
      task:$("#f-task").value.trim(),task_description:$("#f-desc").value.trim(),
      status:normStatus($("#f-status").value),urgency:normUrg($("#f-urg").value),
      assignee:$("#f-asg").value.trim(),deadline:$("#f-due").value.trim(),
      source_type:$("#f-src").value.trim(),growth_pillar:$("#f-pillar").value.trim(),summary:$("#f-sum").value.trim(),
    };
    if(!data.task){$("#f-task").focus();return;}
    if(t){Object.assign(t,data);toast("Saved");}
    else{TASKS.unshift(clean({...data,id:uid(),created_at:new Date().toISOString()}));toast("Task created");}
    save();closeModal();render();
  };
  if(t)$("#f-del").onclick=()=>{if(confirm("Delete this task?")){TASKS=TASKS.filter(x=>x.id!==t.id);save();closeModal();render();toast("Deleted");}};
}
function closeModal(){$("#modal").classList.remove("open");}
$("#modal").onclick=e=>{if(e.target.id==="modal")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

function ingest(rows){
  const add=rows.map(d=>{const g=(...ks)=>{for(const k of ks){const h=Object.keys(d).find(x=>x.toLowerCase().replace(/[^a-z]/g,"")===k);if(h&&d[h]!=null&&d[h]!=="")return d[h];}return"";};
    return clean({id:g("id","taskid")||uid(),source_type:g("sourcetype","source","type"),source_link:g("sourcelink","link"),
      task:g("task","taskheading","heading","title"),task_description:g("taskdescription","description"),
      growth_pillar:g("growthpillar","pillar"),deadline:g("deadline","taskdeadline","due","duedate"),
      urgency:g("urgency","priority")||"Medium",assignee:g("assignee","spoc","owner"),summary:g("summary","remarks"),
      status:g("status")||"open",created_at:g("createdat","created","taskgivenon")||new Date().toISOString()});});
  TASKS=add;save();activeSrc="All";activeAsg="All";render();toast("Imported "+add.length+" tasks");
}
function handleFile(file){
  const ext=(file.name.split(".").pop()||"").toLowerCase();const r=new FileReader();
  r.onload=()=>{try{
    if(ext==="json"){const j=JSON.parse(r.result);ingest(j.tasks||j);}
    else{const wb=XLSX.read(r.result,{type:"array"});const sn=wb.SheetNames.includes("All Tasks")?"All Tasks":wb.SheetNames[0];
      ingest(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""}));}
  }catch(e){alert("Parse error: "+e);}};
  if(ext==="json")r.readAsText(file);else r.readAsArrayBuffer(file);
}
$("#file").onchange=e=>{const f=e.target.files[0];if(f)handleFile(f);};
$("#loadBtn").onclick=()=>$("#file").click();
$("#exportBtn").onclick=()=>{const blob=new Blob([JSON.stringify({generated_from:"board export",count:TASKS.length,tasks:TASKS},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="tasks-export.json";a.click();toast("Exported JSON");};
$("#addBtn").onclick=()=>openEditor(null);
$("#q").oninput=e=>{query=e.target.value.trim().toLowerCase();render();};
$("#sortSel").onchange=e=>{sortBy=e.target.value;render();};
document.addEventListener("click",e=>{const c=e.target.closest(".chip");if(!c)return;
  if(c.dataset.f==="src")activeSrc=c.dataset.v;else if(c.dataset.f==="asg")activeAsg=c.dataset.v;render();});

boot();
</script>
</body>
</html>
